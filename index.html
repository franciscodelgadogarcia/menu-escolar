<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Escolar Mensual</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f8f9fa; }
    h1 { color: #2c3e50; text-align: center; }
    .container { max-width: 1200px; margin: 0 auto; }
    .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
    th, td { padding: 12px; text-align: center; border: 1px solid #dee2e6; }
    th { background: #e9ecef; }
    select { width: 100%; padding: 6px; border-radius: 4px; }
    button { background: #198754; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    button:hover { background: #157347; }
    .day-cell { min-width: 150px; }
    @media (max-width: 768px) {
      .day-cell { min-width: 120px; font-size: 0.9em; }
      select { font-size: 0.85em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Generador de Menús Escolares Mensuales</h1>

    <div class="controls">
      <label for="mes">Mes:</label>
      <select id="mes">
        <option value="0">Enero</option>
        <option value="1">Febrero</option>
        <option value="2">Marzo</option>
        <option value="3">Abril</option>
        <option value="4">Mayo</option>
        <option value="5">Junio</option>
        <option value="6">Julio</option>
        <option value="7">Agosto</option>
        <option value="8">Septiembre</option>
        <option value="9">Octubre</option>
        <option value="10">Noviembre</option>
        <option value="11">Diciembre</option>
      </select>

      <label for="anio">Año:</label>
      <input type="number" id="anio" value="2024" min="2020" max="2030">

      <button onclick="generarCalendario()">Generar calendario</button>
    </div>

    <div id="calendario"></div>

    <div style="text-align: center; margin-top: 20px;">
      <button onclick="exportarMenuMensual()">📥 Exportar menú mensual a Excel</button>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script>
    let platos = [];
    let menuMensual = {}; // { "2024-09-02": { primer: "...", segundo: "...", postre: "..." }, ... }

    // Cargar platos al iniciar
    fetch('/api/platos')
      .then(res => res.json())
      .then(data => {
        platos = data.platos;
        document.getElementById('anio').value = new Date().getFullYear();
        generarCalendario();
      });

    // Clasificar platos
    function clasificarPlatos() {
      const esPrimer = p => /lentejas|alubias|sopa|crema|pasta|arroz|verduras|guiso|puré/i.test(p.nombre);
      const esPostre = p => /postre|fruta|yogur|manzana|pera|plátano|naranja|uva|melón|kiwi|mandarina/i.test(p.nombre);
      
      const primeros = platos.filter(esPrimer);
      const postres = platos.filter(esPostre);
      const segundos = platos.filter(p => !esPrimer(p) && !esPostre(p));
      
      return { primeros, segundos, postres };
    }

    // Generar calendario del mes
    function generarCalendario() {
      const mes = parseInt(document.getElementById('mes').value);
      const anio = parseInt(document.getElementById('anio').value);
      const { primeros, segundos, postres } = clasificarPlatos();

      // Limpiar menú actual
      menuMensual = {};

      // Crear tabla
      let html = `<table>
        <thead>
          <tr>
            <th>Día</th>
            <th>Primer plato</th>
            <th>Segundo plato</th>
            <th>Postre</th>
          </tr>
        </thead>
        <tbody>`;

      // Obtener primer día del mes
      const primerDia = new Date(anio, mes, 1);
      const ultimoDia = new Date(anio, mes + 1, 0);

      for (let d = primerDia.getDate(); d <= ultimoDia.getDate(); d++) {
        const fecha = new Date(anio, mes, d);
        const diaSemana = fecha.getDay(); // 0 = dom, 1 = lun, ..., 5 = vie, 6 = sáb

        // Solo lunes a viernes
        if (diaSemana >= 1 && diaSemana <= 5) {
          const fechaStr = fecha.toISOString().split('T')[0]; // "2024-09-02"
          const menuDia = menuMensual[fechaStr] || { primer: "", segundo: "", postre: "" };

          html += `
            <tr>
              <td class="day-cell">${d} (${['', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie'][diaSemana]})</td>
              <td>
                <select onchange="actualizarMenu('${fechaStr}', 'primer', this.value)">
                  <option value="">-- Seleccionar --</option>
                  ${primeros.map(p => `<option value="${p.nombre}" ${p.nombre === menuDia.primer ? 'selected' : ''}>${p.nombre}</option>`).join('')}
                </select>
              </td>
              <td>
                <select onchange="actualizarMenu('${fechaStr}', 'segundo', this.value)">
                  <option value="">-- Seleccionar --</option>
                  ${segundos.map(p => `<option value="${p.nombre}" ${p.nombre === menuDia.segundo ? 'selected' : ''}>${p.nombre}</option>`).join('')}
                </select>
              </td>
              <td>
                <select onchange="actualizarMenu('${fechaStr}', 'postre', this.value)">
                  <option value="">-- Seleccionar --</option>
                  ${postres.map(p => `<option value="${p.nombre}" ${p.nombre === menuDia.postre ? 'selected' : ''}>${p.nombre}</option>`).join('')}
                </select>
              </td>
            </tr>`;
        }
      }

      html += `</tbody></table>`;
      document.getElementById('calendario').innerHTML = html;
    }

    function actualizarMenu(fecha, tipo, valor) {
      if (!menuMensual[fecha]) menuMensual[fecha] = { primer: "", segundo: "", postre: "" };
      menuMensual[fecha][tipo] = valor;
    }

    function exportarMenuMensual() {
      const { primeros, segundos, postres } = clasificarPlatos();
      
      // Crear array para Excel
      const data = [["Fecha", "Día", "1º Plato", "2º Plato", "Postre", "Alérgenos 1º", "Alérgenos 2º", "Alérgenos Postre", "Gramaje total (g)"]];
      
      Object.keys(menuMensual).forEach(fecha => {
        const menu = menuMensual[fecha];
        if (!menu.primer && !menu.segundo && !menu.postre) return;

        const fechaObj = new Date(fecha);
        const diaSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][fechaObj.getDay()];

        // Buscar alérgenos y gramaje
        const getPlato = nombre => [...primeros, ...segundos, ...postres].find(p => p.nombre === nombre);
        
        const p1 = getPlato(menu.primer);
        const p2 = getPlato(menu.segundo);
        const p3 = getPlato(menu.postre);

        const alerg1 = p1?.alergenos?.join(", ") || "";
        const alerg2 = p2?.alergenos?.join(", ") || "";
        const alerg3 = p3?.alergenos?.join(", ") || "";
        
        const gramos = (p1?.gramos_racion || 0) + (p2?.gramos_racion || 0) + (p3?.gramos_racion || 0);

        data.push([
          fecha,
          diaSemana,
          menu.primer || "",
          menu.segundo || "",
          menu.postre || "",
          alerg1,
          alerg2,
          alerg3,
          gramos > 0 ? gramos : ""
        ]);
      });

      if (data.length === 1) {
        alert("No hay menú seleccionado para exportar.");
        return;
      }

      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Menú Mensual");
      const mes = document.getElementById('mes').value;
      const anio = document.getElementById('anio').value;
      const nombreMes = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][mes];
      XLSX.writeFile(wb, `menu_escolar_${nombreMes}_${anio}.xlsx`);
    }
  </script>
</body>
</html>
